services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: coffee-server
    restart: unless-stopped
    env_file: ./server/.env          # reads ADMIN_PASSWORD, STAFF_TOKEN, CORS_ORIGIN
    environment:
      - PORT=4000
      - DB_PATH=/data/coffee.db
    volumes:
      - coffee_db:/data
    networks:
      - internal
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: coffee-client
    restart: unless-stopped
    ports:
      - "4001:80"
    networks:
      - internal
    depends_on:
      server:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes:
  coffee_db:
