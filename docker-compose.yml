services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: coffee-server
    restart: unless-stopped
    env_file: ./server/.env          # reads POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
    extra_hosts:
      - "host-gateway:host-gateway"
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@host-gateway:${POSTGRES_PORT}/${POSTGRES_DB}
    networks:
      - internal
    ports:
      - "4000:4000"
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: coffee-client
    restart: unless-stopped
    ports:
      - "4001:80"
    networks:
      - internal
    depends_on:
      server:
        condition: service_healthy

networks:
  internal:
    driver: bridge

volumes: {}
